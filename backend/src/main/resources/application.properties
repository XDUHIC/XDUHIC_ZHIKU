# port
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:hic}?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring application name
spring.application.name=backend

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=com.example.backend.config

# 前端域名（生产环境）
app.frontend.origin=${FRONTEND_URL:http://localhost:3002/}

# 文件上传配置 
file.upload-dir=${UPLOAD_DIR:uploads}
app.file.upload-dir=${UPLOAD_DIR:uploads}
file.upload.path=${UPLOAD_DIR:uploads}
file.upload.url=${FILE_UPLOAD_URL:http://localhost:8081/uploads}

# 安全配置
app.security.max-login-attempts=5
app.security.lockout-duration=30
app.security.session-timeout=30
server.error.include-stacktrace=never
server.error.include-message=never

# servlet
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# 编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# HTTP/2支持
server.http2.enabled=true

# 日志配置
logging.level.root=WARN
logging.level.com.example.backend=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN


# 监控配置
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# 性能优化
spring.main.lazy-initialization=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT配置
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expire-minutes=43200
app.jwt.refresh-expire-minutes=43200

# 安全配置
server.ssl.enabled=false

# 静态资源配置
spring.web.resources.static-locations=classpath:/static/,file:${UPLOAD_DIR:uploads}/
spring.mvc.static-path-pattern=/uploads/**

# 认证密钥
app.hic.auth.key=${AUTH_KEY}

